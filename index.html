  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #faf9f6;
      --accent: #1a6bff;
      --accent-dark: #0047cc;
      --accent-soft: #e8f0ff;
      --green: #00b87a;
      --green-soft: #e6f9f3;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 40px rgba(26,107,255,0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,246,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem; color: var(--ink); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      text-decoration: none; color: var(--muted);
      font-size: 0.88rem; font-weight: 500;
      padding: 6px 14px; border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--ink); background: var(--accent-soft); }
    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      padding: 8px 18px !important;
    }
    .nav-cta:hover { background: var(--accent-dark) !important; }

    /* ── PAGE SECTIONS ── */
    section { display: none; }
    section.active { display: block; }

    /* ── HERO ── */
    .hero {
      max-width: 1100px; margin: 0 auto;
      padding: 80px 24px 60px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
    }
    @media(max-width:768px){ .hero { grid-template-columns:1fr; gap:40px; padding:48px 20px 40px; } }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-soft); color: var(--green);
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
      padding: 6px 14px; border-radius: 100px;
      margin-bottom: 20px;
    }
    .hero-badge::before { content: "●"; font-size: 0.5rem; }

    .page-h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1.2; margin-bottom: 12px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2; color: var(--ink);
      margin-bottom: 20px;
    }
    h1 em { font-style: italic; color: var(--accent); }

    .hero-para {
      color: var(--muted); font-size: 1rem; margin-bottom: 32px;
      max-width: 480px;
    }

    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      font-family: 'Sora', sans-serif; font-size: 0.92rem; font-weight: 600;
      padding: 14px 26px; border-radius: var(--radius-sm);
      text-decoration: none; border: none; cursor: pointer;
      transition: all 0.22s; box-shadow: 0 4px 16px rgba(26,107,255,0.25);
    }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,107,255,0.35); }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--ink);
      font-family: 'Sora', sans-serif; font-size: 0.92rem; font-weight: 500;
      padding: 14px 24px; border-radius: var(--radius-sm);
      text-decoration: none; border: 1.5px solid var(--border); cursor: pointer;
      transition: all 0.22s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .hero-visual {
      background: linear-gradient(135deg, #e8f0ff 0%, #f0f7ff 100%);
      border-radius: 24px; padding: 36px;
      border: 1px solid #d0e0ff;
    }
    .hero-card {
      background: #fff; border-radius: var(--radius); padding: 20px 24px;
      box-shadow: var(--shadow); margin-bottom: 12px;
      display: flex; align-items: center; gap: 14px;
    }
    .hero-card:last-child { margin-bottom: 0; }
    .hero-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .icon-blue { background: var(--accent-soft); }
    .icon-green { background: var(--green-soft); }
    .hero-card-title { font-weight: 600; font-size: 0.9rem; color: var(--ink); }
    .hero-card-sub { font-size: 0.78rem; color: var(--muted); }
    .hero-card-price {
      margin-left: auto; font-weight: 700;
      font-size: 0.95rem; color: var(--accent);
    }

    /* ── TRUST BAR ── */
    .trust-bar {
      background: var(--ink); color: #fff;
      padding: 18px 24px;
    }
    .trust-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;
    }
    .trust-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.83rem; font-weight: 500;
    }
    .trust-item span:first-child { font-size: 1.1rem; }

    /* ── SECTION TITLES ── */
    .section-wrap { max-width: 1100px; margin: 0 auto; padding: 72px 24px; }
    @media(max-width:768px){ .section-wrap { padding: 48px 20px; } }

    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
    }
    h2 {

      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.25; margin-bottom: 14px;
    }
    .section-sub { color: var(--muted); max-width: 540px; margin-bottom: 48px; }

    /* ── SERVICE CARDS ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }

    .service-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 32px 28px;
      transition: all 0.25s;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent); transform: scaleX(0); transition: transform 0.25s;
    }
    .service-card:hover { box-shadow: var(--shadow-hover); border-color: #c0d4ff; transform: translateY(-4px); }
    .service-card:hover::before { transform: scaleX(1); }

    .card-icon { font-size: 2rem; margin-bottom: 16px; }
    .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }
    .card-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
    .card-price {
      font-size: 1.4rem; font-weight: 800; color: var(--ink);
      margin-bottom: 18px;
    }
    .card-price span { font-size: 0.85rem; font-weight: 400; color: var(--muted); }
    .card-features { list-style: none; margin-bottom: 24px; }
    .card-features li {
      font-size: 0.83rem; padding: 5px 0;
      display: flex; align-items: center; gap: 8px; color: var(--ink);
    }
    .card-features li::before { content: "✓"; color: var(--green); font-weight: 700; }

    /* ── BENEFITS ── */
    .benefits-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .benefit-item {
      background: var(--card); border-radius: var(--radius);
      padding: 24px 20px; border: 1.5px solid var(--border);
    }
    .benefit-icon { font-size: 1.8rem; margin-bottom: 12px; }
    .benefit-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
    .benefit-desc { font-size: 0.82rem; color: var(--muted); }

    /* ── CTA BANNER ── */
    .cta-banner {
      background: linear-gradient(135deg, var(--accent) 0%, #005be0 100%);
      border-radius: 24px; padding: 52px 40px;
      text-align: center; color: #fff;
    }
    @media(max-width:600px){ .cta-banner { padding: 40px 24px; } }
    .cta-banner h2 { font-family: 'DM Serif Display', serif; color: #fff; margin-bottom: 12px; }
    .cta-banner p { opacity: 0.85; margin-bottom: 28px; }
    .btn-white {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; color: var(--accent);
      font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 700;
      padding: 14px 28px; border-radius: var(--radius-sm);
      text-decoration: none; transition: all 0.2s;
    }
    .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

    /* ── FAQ ── */
    .faq-list { max-width: 720px; }
    .faq-item {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 12px; overflow: hidden;
    }
    .faq-q {
      width: 100%; background: var(--card);
      padding: 18px 20px; text-align: left;
      font-family: 'Sora', sans-serif; font-size: 0.92rem; font-weight: 600;
      border: none; cursor: pointer; color: var(--ink);
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.2s;
    }
    .faq-q:hover { background: var(--accent-soft); }
    .faq-q .arrow { transition: transform 0.25s; font-size: 0.8rem; color: var(--accent); }
    .faq-q.open .arrow { transform: rotate(180deg); }
    .faq-a {
      display: none; padding: 0 20px 18px;
      font-size: 0.87rem; color: var(--muted); background: var(--card);
      line-height: 1.7;
    }
    .faq-a.open { display: block; }

    /* ── SERVICES PAGE ── */
    .price-table {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px; margin-bottom: 60px;
    }
    .price-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 32px 28px;
      position: relative;
    }
    .price-card.featured {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,107,255,0.12);
    }
    .featured-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      padding: 4px 14px; border-radius: 100px;
    }
    .plan-name { font-weight: 700; font-size: 1rem; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .plan-price { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: var(--ink); margin-bottom: 4px; }
    .plan-price small { font-family: 'Sora', sans-serif; font-size: 0.9rem; font-weight: 400; color: var(--muted); }
    .plan-desc { font-size: 0.83rem; color: var(--muted); margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .plan-features { list-style: none; margin-bottom: 28px; }
    .plan-features li { font-size: 0.84rem; padding: 5px 0; display: flex; gap: 8px; }
    .plan-features li::before { content: "✓"; color: var(--green); font-weight: 700; }

    /* ── CONTACT ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
    @media(max-width:700px){ .contact-grid { grid-template-columns: 1fr; } }

    .contact-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 36px 32px;
    }
    .contact-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .contact-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 10px; }
    .contact-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .contact-detail { display: flex; gap: 10px; align-items: center; font-size: 0.87rem; margin-bottom: 10px; }
    .contact-detail a { color: var(--accent); text-decoration: none; }

    .wa-big {
      background: linear-gradient(135deg, #25d366, #128c7e);
      border-radius: 20px; padding: 36px 32px; color: #fff; text-align: center;
    }
    .wa-big .wa-icon { font-size: 3rem; margin-bottom: 12px; }
    .wa-big h3 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 8px; }
    .wa-big p { opacity: 0.9; font-size: 0.88rem; margin-bottom: 24px; }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; color: #25d366;
      font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 700;
      padding: 14px 28px; border-radius: var(--radius-sm);
      text-decoration: none; transition: all 0.2s;
    }
    .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

    /* ── FOOTER ── */
    footer {
      background: var(--ink); color: rgba(255,255,255,0.65);
      padding: 48px 24px 28px;
    }
    .footer-inner {
      max-width: 1100px; margin: 0 auto;
    }
    .footer-top {
      display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px;
      margin-bottom: 40px;
    }
    @media(max-width:700px){ .footer-top { grid-template-columns: 1fr; } }
    .footer-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; color: #fff; margin-bottom: 10px;
    }
    .footer-logo span { color: var(--accent); }
    .footer-about { font-size: 0.83rem; line-height: 1.7; max-width: 280px; }
    .footer-col h4 { color: #fff; font-size: 0.85rem; font-weight: 600; margin-bottom: 14px; letter-spacing: 0.04em; }
    .footer-col a {
      display: block; font-size: 0.82rem; color: rgba(255,255,255,0.55);
      text-decoration: none; margin-bottom: 8px; transition: color 0.2s;
      cursor: pointer;
    }
    .footer-col a:hover { color: #fff; }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px; text-align: center;
      font-size: 0.78rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    /* ── HOW IT WORKS STEPS ── */
    .steps-grid {
      display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
      gap: 0; align-items: center;
    }
    @media(max-width:700px){
      .steps-grid { grid-template-columns: 1fr; gap: 16px; }
      .step-arrow { display: none; }
    }
    .step-item {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 28px 20px; text-align: center;
      position: relative;
    }
    .step-num {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      width: 26px; height: 26px; background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 0.72rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .step-icon { font-size: 2rem; margin-bottom: 10px; }
    .step-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 6px; color: var(--ink); }
    .step-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.65; }
    .step-arrow { font-size: 1.5rem; color: var(--accent); padding: 0 12px; opacity: 0.4; }

    /* ── COMPARISON TABLE ── */
    .compare-wrap {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px; margin-bottom: 48px;
    }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .compare-table th {
      padding: 10px 14px; text-align: center;
      font-weight: 700; font-size: 0.8rem;
      background: var(--paper); color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table .th-featured { background: var(--accent-soft); color: var(--accent); }
    .compare-table td {
      padding: 9px 14px; text-align: center;
      border-bottom: 1px solid var(--border); color: var(--muted);
    }
    .compare-table td:first-child { text-align: left; font-weight: 600; color: var(--ink); }
    .compare-table .td-featured { background: #f5f8ff; color: var(--ink); font-weight: 600; }
    .compare-table tr:last-child td { border-bottom: none; }

      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 0.85rem; font-weight: 600; color: var(--ink);
      text-decoration: none; transition: all 0.2s;
    }
    .quick-order-btn:hover {

    }

    /* ── ORDER STEPS (contact page) ── */
    .order-steps { display: flex; flex-direction: column; gap: 10px; }
    .order-step {

    }
    .os-num {

      border-radius: 50%; font-size: 0.72rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .portfolio-title { font-weight: 700; font-size: 1rem; color: #fff; margin-bottom: 16px; }
    .portfolio-preview {
      background: #fff; border-radius: 12px; overflow: hidden;
      margin-bottom: 14px; min-height: 200px;
    }
    .portfolio-note { font-size: 0
